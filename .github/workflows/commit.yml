name: Check code quality and test everything
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  analyze:
    name: Analyze Code Quality
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby' ]
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.

          # Details on CodeQL's query packs refer to:
          # https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          # queries: security-extended,security-and-quality

      # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
      # If this step fails, then you should remove it and run the build manually (see below)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      # ℹ️ Command-line programs to run using the OS shell.
      # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun

      #   If the Autobuild fails above, remove it and uncomment the following three lines.
      #   modify them (or add more) to build your code if your project, please refer to the EXAMPLE below for guidance.

      # - run: |
      #   echo "Run, Build Application using script"
      #   ./location_of_script_within_repo/buildscript.sh

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: '/language:${{matrix.language}}'

  prettiness:
    name: Check code prettiness and linting
    runs-on: ubuntu-latest
    steps:
      - uses: nrwl/nx-set-shas@v3
      - run: yarn install

      - run: npx nx workspace-lint
      - run: npx nx format --target=check --base=remotes/origin/main --head=HEAD
      - run: yarn prettier
      - run: npx nx affected --target=lint --parallel=3

  test_spec:
    name: Test Specs
    runs-on: ubuntu-latest
    needs: [analyze, prettiness]
    steps:
      - run: npx nx affected --target=test --parallel=3 --ci --code-coverage

      - name: Generate Codecov Report
        uses: codecov/codecov-action@v3

  test_build_affected:
    name: Test Build Affected
    runs-on: ubuntu-latest
    needs: [analyze, prettiness]
    steps:
      - run: npx nx affected --target=build --parallel=3

  test_e2e_dashboard:
    name: Test e2e Dashboard
    runs-on: ubuntu-latest
    needs: [test_spec, test_build_affected]
    steps:
      - run: npx nx e2e --project dashboard-e2e --headless

  test_e2e_website:
    name: Test e2e Website
    runs-on: ubuntu-latest
    needs: [test_spec, test_build_affected]
    steps:
      - run: npx nx e2e --project website-e2e --headless

  test_e2e_api:
    name: Test e2e API
    needs: [test_spec, test_build_affected]
    runs-on: ubuntu-latest
    container: node:lts-alpine3.15
    strategy:
      matrix:
        database-name:
          - postgres
        database-user:
          - postgres
        database-password:
          - mysecretpassword
        database-host:
          - database
        database-port:
          - 5432
        redis-host:
          - redis
        redis-port:
          - 6379
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: ${{ matrix.database-name }}
          POSTGRES_USER: ${{ matrix.database-user }}
          POSTGRES_PASSWORD: ${{ matrix.database-password }}
        ports:
          - ${{ matrix.database-port }}:${{ matrix.database-port }}
        # Set health checks to wait until postgres has started
        options: --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - run: npx nx run test-e2e
        env:
          DATABASE_URL: postgres://${{ matrix.database-user }}:${{ matrix.database-password }}@${{ matrix.database-host }}:${{ matrix.database-port }}/${{ matrix.database-name }}
          REDIS_URL: redis://${{ matrix.redis-host }}:${{ matrix.redis-port }}
